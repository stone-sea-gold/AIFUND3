<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📈 股票交易看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #2d2a1f; --surface: rgba(55,50,35,0.55); --surface2: rgba(65,60,42,0.5);
  --border: rgba(140,130,90,0.25); --text: #cdc8b0; --text2: #908872;
  --green: #a8b868; --red: #c8887a; --amber: #c8a848;
  --blue: #8aa08a; --purple: #c4a0b8;
  --green-bg: rgba(168,184,104,.12); --red-bg: rgba(200,136,122,.12);
  --amber-bg: rgba(200,168,72,.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:linear-gradient(135deg,#2d2a1f 0%,#2a2518 50%,#28241a 100%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif; line-height:1.6; padding:12px; max-width:960px; margin:0 auto; min-height:100vh; }
h1 { font-size:1.4em; margin-bottom:4px; }
h2 { font-size:1.1em; color:var(--blue); margin:20px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
h3 { font-size:.95em; color:var(--text2); margin:12px 0 6px; }
.meta { color:var(--text2); font-size:.8em; margin-bottom:16px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:.75em; font-weight:600; }
.badge-green { background:var(--green-bg); color:var(--green); }
.badge-red { background:var(--red-bg); color:var(--red); }
.badge-amber { background:var(--amber-bg); color:var(--amber); }
.badge-blue { background:rgba(138,160,138,.15); color:var(--blue); }

/* ── Tab 导航 ── */
.tab-nav { display:flex; gap:4px; margin:12px 0 16px; border-bottom:1px solid var(--border); padding-bottom:0; }
.tab-btn { background:transparent; color:var(--text2); border:none; border-bottom:2px solid transparent; padding:8px 16px; font-size:.9em; cursor:pointer; transition:.15s; font-family:inherit; }
.tab-btn:hover { color:var(--text); border-bottom-color:var(--text2); }
.tab-btn.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:600; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── 选股面板 ── */
.scan-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin:10px 0; }
.scan-params { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
.scan-params label { font-size:.8em; color:var(--text2); display:flex; flex-direction:column; gap:3px; }
.scan-params select, .scan-params input { background:rgba(40,38,28,0.8); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:5px 8px; font-size:.85em; font-family:inherit; min-width:100px; }
.scan-params select:focus, .scan-params input:focus { outline:none; border-color:var(--blue); }
.scan-params input[type=number] { min-width:70px; width:80px; }
.btn-scan { background:var(--blue); color:#fff; border:none; border-radius:6px; padding:8px 24px; font-size:.9em; cursor:pointer; font-family:inherit; font-weight:600; transition:.15s; margin-top:12px; }
.btn-scan:hover { opacity:.85; }
.btn-scan:disabled { opacity:.4; cursor:not-allowed; }
.btn-scan-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 16px; font-size:.85em; cursor:pointer; font-family:inherit; transition:.15s; }
.btn-scan-secondary:hover { border-color:var(--blue); color:var(--text); }

/* ── 进度条 ── */
.progress-area { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin:10px 0; }
.progress-bar { height:8px; background:var(--bg); border-radius:4px; overflow:hidden; margin-bottom:8px; }
.progress-fill { height:100%; background:var(--blue); border-radius:4px; transition:width .5s; width:0%; }
.progress-fill.done { background:var(--green); }
.progress-fill.fail { background:var(--red); }
.progress-text { font-size:.82em; color:var(--text2); }
.progress-text strong { color:var(--text); }

/* ── 结果表格 ── */
.scan-results { margin-top:12px; overflow-x:auto; }
.scan-results table { min-width:500px; }
.scan-results .row-s { cursor:pointer; }
.scan-results .row-s:hover td { background:var(--surface2); }
.scan-results .row-detail td { background:var(--surface); padding:10px 14px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; font-size:.82em; }
.detail-grid .label { color:var(--text2); }
.detail-grid .value { color:var(--text); }
.score-high { color:var(--green); font-weight:600; }
.score-mid { color:var(--amber); font-weight:600; }
.score-low { color:var(--text2); }
.cond-pass { color:var(--green); }
.cond-fail { color:var(--text2); }

/* ── 单票诊断 ── */
.test-area { margin:10px 0; }
.test-area input { background:rgba(40,38,28,0.8); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:5px 8px; font-size:.85em; font-family:inherit; width:120px; }
.test-area input:focus { outline:none; border-color:var(--blue); }
.test-result { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; margin:8px 0; white-space:pre-wrap; font-size:.82em; }

/* ── 警告条 ── */
.alert { background:var(--red-bg); border:1px solid rgba(239,68,68,.3); border-radius:6px; padding:8px 12px; margin:10px 0; font-size:.85em; }
.alert-amber { background:var(--amber-bg); border-color:rgba(245,158,11,.3); }

table { width:100%; border-collapse:collapse; font-size:.82em; margin:6px 0; }
th { text-align:left; color:var(--text2); font-weight:500; padding:4px 6px; border-bottom:1px solid var(--border); }
td { padding:4px 6px; border-bottom:1px solid rgba(140,130,90,.2); vertical-align:top; }

/* ── 选股跟踪看板 ── */
.tracker-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:12px 0; padding:10px 14px; background:var(--surface); border-radius:8px; border:1px solid var(--border); }
.tracker-toolbar .refresh-info { font-size:.8em; color:var(--text2); }
.tracker-columns { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:12px; margin-top:10px; }
.tracker-column { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; }
.tracker-column h3 { font-size:.95em; color:var(--blue); margin:0 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.tracker-date-group { margin-bottom:12px; }
.tracker-date-group:last-child { margin-bottom:0; }
.tracker-date-title { font-size:.8em; color:var(--text2); margin-bottom:6px; font-weight:600; display:flex; align-items:center; gap:6px; }
.tracker-date-title .pool-tag { font-weight:400; color:var(--purple); font-size:.9em; }
.tracker-date-title .delete-btn { margin-left:auto; background:none; border:none; color:var(--text2); cursor:pointer; font-size:1em; padding:0 4px; opacity:.5; transition:.15s; }
.tracker-date-title .delete-btn:hover { color:var(--red); opacity:1; }
.tracker-table { font-size:.78em; }
.tracker-table th { font-size:.85em; padding:3px 4px; }
.tracker-table td { padding:3px 4px; }
.tracker-no-data { color:var(--text2); font-size:.85em; text-align:center; padding:20px; }
.tracker-pnl-up { color:var(--green); font-weight:600; }
.tracker-pnl-down { color:var(--red); font-weight:600; }

/* ── 持仓看板 ── */
.holdings-summary { display:flex; gap:16px; flex-wrap:wrap; margin:12px 0; }
.holdings-summary .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 18px; min-width:140px; }
.holdings-summary .summary-card .label { font-size:.78em; color:var(--text2); }
.holdings-summary .summary-card .value { font-size:1.3em; font-weight:700; margin-top:2px; }

.holdings-table-wrap { overflow-x:auto; margin:10px 0; }
.holdings-table { min-width:700px; }
.holdings-table .btn-edit { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:3px 10px; font-size:.78em; cursor:pointer; transition:.15s; }
.holdings-table .btn-edit:hover { border-color:var(--blue); color:var(--text); }
.holdings-table .btn-close { background:var(--red-bg); color:var(--red); border:1px solid rgba(200,136,122,.3); border-radius:4px; padding:3px 10px; font-size:.78em; cursor:pointer; transition:.15s; }
.holdings-table .btn-close:hover { background:rgba(200,136,122,.25); }
.holdings-table .btn-delete { background:none; color:var(--text2); border:none; cursor:pointer; font-size:.85em; padding:3px 6px; opacity:.5; transition:.15s; }
.holdings-table .btn-delete:hover { color:var(--red); opacity:1; }
.holdings-table .pnl-up { color:var(--green); font-weight:600; }
.holdings-table .pnl-down { color:var(--red); font-weight:600; }

.holdings-form { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin:10px 0; }
.holdings-form .form-row { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
.holdings-form label { font-size:.8em; color:var(--text2); display:flex; flex-direction:column; gap:3px; }
.holdings-form select, .holdings-form input { background:rgba(40,38,28,0.8); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:5px 8px; font-size:.85em; font-family:inherit; min-width:100px; }
.holdings-form select:focus, .holdings-form input:focus { outline:none; border-color:var(--blue); }
.holdings-form .form-actions { margin-top:10px; display:flex; gap:8px; }

.closed-section { margin:20px 0; }
.closed-section summary { cursor:pointer; font-weight:600; font-size:.95em; color:var(--blue); list-style:none; }
.closed-section summary::before { content:'▸ '; }
.closed-section[open] summary::before { content:'▾ '; }

.nav-section { margin:20px 0; }
.nav-chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; margin:10px 0; }
.nav-chart-wrap canvas { width:100%; max-height:300px; }
.nav-actions { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0; }

/* ── 磨砂玻璃效果 ── */
.scan-panel, .progress-area, .test-result, .tracker-toolbar, .tracker-column,
.btn-scan-secondary, .holdings-form, .holdings-summary .summary-card, .nav-chart-wrap {
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

@media(max-width:480px) {
  body { padding:8px; }
  .scan-params { flex-direction:column; align-items:stretch; }
  .scan-params select, .scan-params input { min-width:auto; }
  .holdings-summary { flex-direction:column; }
  .holdings-form .form-row { flex-direction:column; }
  .holdings-form select, .holdings-form input { min-width:auto; width:100%; }
}
</style>
</head>
<body>

<h1>📈 股票交易看板</h1>

<!-- ════════ Tab 导航 ════════ -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="dashboard">📊 持仓看板</button>
  <button class="tab-btn" data-tab="stock-selection">🎯 选股扫描</button>
  <button class="tab-btn" data-tab="tracker">📋 选股跟踪</button>
</div>

<!-- ════════ Tab: 持仓看板 ════════ -->
<div id="tab-dashboard" class="tab-content active">

<!-- 净值汇总 -->
<div class="holdings-summary" id="nav-summary"></div>

<!-- 持仓操作区 -->
<h2>📊 当前持仓</h2>
<div id="add-trade-area"></div>
<div class="holdings-table-wrap" id="open-trades-wrap">
  <div id="open-trades-empty" style="color:var(--text2);font-size:.85em;padding:16px 0;">暂无持仓记录。点击上方按钮添加。</div>
  <table class="holdings-table" id="open-trades-table" style="display:none">
    <thead><tr>
      <th>股票</th><th>代码</th><th>买入日期</th><th>持仓成本</th><th>持仓数量</th><th>买入策略</th><th>操作</th>
    </tr></thead>
    <tbody id="open-trades-body"></tbody>
  </table>
</div>

<!-- 已清仓交易 -->
<details class="closed-section" id="closed-section">
  <summary>📋 已清仓交易</summary>
  <div class="holdings-table-wrap">
    <table class="holdings-table" id="closed-trades-table" style="display:none">
      <thead><tr>
        <th>股票</th><th>代码</th><th>买入日期</th><th>持仓成本</th><th>卖出日期</th><th>卖出价</th><th>盈亏</th><th>盈亏比</th><th>买入策略</th><th>卖出策略</th>
      </tr></thead>
      <tbody id="closed-trades-body"></tbody>
    </table>
    <div id="closed-trades-empty" style="color:var(--text2);font-size:.85em;padding:12px 0;">暂无已清仓记录。</div>
  </div>
</details>

<!-- 净值曲线 -->
<div class="nav-section">
  <h2>📈 账户净值曲线</h2>
  <div id="nav-actions-area"></div>
  <div class="nav-chart-wrap">
    <canvas id="nav-chart"></canvas>
  </div>
  <div id="nav-empty" style="color:var(--text2);font-size:.85em;text-align:center;padding:20px;">请先初始化账户净值。</div>
</div>

</div><!-- /tab-dashboard -->

<!-- ════════ Tab: 选股扫描 ════════ -->
<div id="tab-stock-selection" class="tab-content">

<h2>🎯 选股扫描</h2>

<!-- 参数面板 -->
<div class="scan-panel">
  <div class="scan-params">
    <label>选股策略
      <select id="ss-strategy">
        <option value="b1">B1量价共振</option>
        <option value="brick">砖型图趋势拐点</option>
        <option value="ruthless_wave">无情操盘手+波浪理论</option>
      </select>
    </label>
    <label>股票池
      <select id="ss-pool">
        <option value="沪深300">沪深300 (~300只)</option>
        <option value="中证500">中证500 (~500只)</option>
        <option value="沪深主板">沪深主板 (~3300只)</option>
        <option value="全A">全A (~5000只)</option>
        <option value="自选">自选</option>
      </select>
    </label>
    <label>Top N
      <input type="number" id="ss-top" value="30" min="5" max="200">
    </label>
    <label>最低分
      <input type="number" id="ss-min-score" value="25" min="0" max="100">
    </label>
    <label>间隔(秒)
      <input type="number" id="ss-delay" value="0.15" min="0" max="2" step="0.05">
    </label>
  </div>
  <button class="btn-scan" id="ss-btn" onclick="startScan()">🚀 开始扫描</button>
  <button class="btn-scan" id="ss-stop-btn" onclick="stopScan()" style="display:none;background:var(--red)">⏹ 停止扫描</button>
</div>

<!-- 进度展示 -->
<div id="ss-progress" class="progress-area" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="ss-progress-fill"></div></div>
  <div class="progress-text" id="ss-progress-text"></div>
</div>

<!-- 错误信息 -->
<div id="ss-error" class="alert" style="display:none"></div>

<!-- 结果 -->
<div id="ss-results" class="scan-results" style="display:none">
  <h3>扫描结果 <span id="ss-result-summary" style="font-weight:400;font-size:.85em;color:var(--text2)"></span></h3>
  <div id="ss-result-table"></div>
</div>

<hr style="border-color:var(--border);margin:20px 0;">

<!-- 单票诊断 -->
<h3>🔍 单票诊断</h3>
<div class="test-area">
  <label style="font-size:.8em;color:var(--text2);margin-right:6px;">股票代码</label>
  <input type="text" id="ss-test-code" placeholder="例如 600519" style="text-transform:uppercase;">
  <label style="font-size:.8em;color:var(--text2);margin:0 6px 0 12px;">策略</label>
  <select id="ss-test-strategy" style="background:rgba(40,38,28,0.8);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:.85em;">
    <option value="b1">B1量价共振</option>
    <option value="brick">砖型图趋势拐点</option>
    <option value="ruthless_wave">无情操盘手+波浪理论</option>
  </select>
  <button class="btn-scan-secondary" onclick="testStock()" style="margin-left:8px;">诊断</button>
</div>
<div id="ss-test-result" class="test-result" style="display:none"></div>

</div><!-- /tab-stock-selection -->

<!-- ════════ Tab: 选股跟踪 ════════ -->
<div id="tab-tracker" class="tab-content">

<h2>📋 选股跟踪</h2>

<div class="tracker-toolbar">
  <span class="refresh-info" id="tracker-refresh-info">上次刷新: 从未</span>
  <button class="btn-scan" id="tracker-refresh-btn" onclick="refreshTracker()" style="font-size:.8em;padding:6px 16px;">🔄 刷新全部价格</button>
</div>

<div id="tracker-content">
  <div class="tracker-no-data" id="tracker-empty">暂无跟踪数据。完成选股扫描后，结果将自动保存到这里。</div>
  <div id="tracker-columns" class="tracker-columns" style="display:none"></div>
</div>

</div><!-- /tab-tracker -->

<script>
// ═══════════════════════════════════════════════════════════
// Tab 切换
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    if (this.dataset.tab === 'stock-selection') {
      loadPoolsAndStrategies();
    }
    if (this.dataset.tab === 'tracker') {
      loadTracker();
    }
    if (this.dataset.tab === 'dashboard') {
      loadDashboard();
    }
  });
});

// ═══════════════════════════════════════════════════════════
// 持仓看板
// ═══════════════════════════════════════════════════════════

let _holdingsStrategies = {buy:[], sell:[]};
let _navChart = null;

async function loadDashboard() {
  await Promise.all([loadHoldings(), loadNav()]);
}

// ── 策略加载 ──
async function loadStrategies() {
  try {
    const resp = await fetch('/api/holdings/strategies');
    _holdingsStrategies = await resp.json();
  } catch(e) { console.warn('加载策略失败', e); }
}

function strategyLabel(type, id) {
  const list = _holdingsStrategies[type] || [];
  const found = list.find(s => s.id === id);
  return found ? found.label : id;
}

function strategyOptions(type) {
  return (_holdingsStrategies[type] || []).map(s =>
    `<option value="${s.id}">${s.label}</option>`
  ).join('');
}

// ── 持仓 CRUD ──
async function loadHoldings() {
  try {
    const resp = await fetch('/api/holdings?status=open');
    const data = await resp.json();
    renderOpenTrades(data.trades || []);
  } catch(e) {
    console.warn('加载持仓失败', e);
  }
  try {
    const resp = await fetch('/api/holdings?status=closed');
    const data = await resp.json();
    renderClosedTrades(data.trades || []);
  } catch(e) { console.warn('加载已清仓失败', e); }
}

function renderOpenTrades(trades) {
  const tbody = document.getElementById('open-trades-body');
  const table = document.getElementById('open-trades-table');
  const empty = document.getElementById('open-trades-empty');
  const area = document.getElementById('add-trade-area');

  // 渲染添加按钮
  area.innerHTML = `<button class="btn-scan" onclick="showAddForm()" style="margin-top:0;padding:6px 18px;font-size:.85em;">＋ 新增持仓</button>`;

  if (trades.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  empty.style.display = 'none';

  tbody.innerHTML = trades.map(t => `
    <tr>
      <td><strong>${t.stock_name}</strong></td>
      <td style="color:var(--text2)">${t.stock_code}</td>
      <td>${t.buy_date}</td>
      <td>${t.cost_price.toFixed(2)}</td>
      <td>${t.shares.toLocaleString()}</td>
      <td><span class="badge badge-blue">${strategyLabel('buy', t.buy_strategy)}</span></td>
      <td>
        <button class="btn-edit" onclick="showEditForm('${t.id}')">编辑</button>
        <button class="btn-close" onclick="showCloseForm('${t.id}')">清仓</button>
        <button class="btn-delete" onclick="deleteTrade('${t.id}')" title="删除">✕</button>
      </td>
    </tr>
  `).join('');
}

function renderClosedTrades(trades) {
  const tbody = document.getElementById('closed-trades-body');
  const table = document.getElementById('closed-trades-table');
  const empty = document.getElementById('closed-trades-empty');

  if (trades.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  empty.style.display = 'none';

  tbody.innerHTML = trades.map(t => {
    const pnlClass = t.pnl >= 0 ? 'pnl-up' : 'pnl-down';
    const pnlSign = t.pnl >= 0 ? '+' : '';
    return `
    <tr>
      <td><strong>${t.stock_name}</strong></td>
      <td style="color:var(--text2)">${t.stock_code}</td>
      <td>${t.buy_date}</td>

let _pollTimer = null;

async function loadPoolsAndStrategies() {
  try {

      ).join('');
    }

  }
}

async function startScan() {
  const btn = document.getElementById('ss-btn');
  const progress = document.getElementById('ss-progress');
  const progressFill = document.getElementById('ss-progress-fill');
  const progressText = document.getElementById('ss-progress-text');
  const errorDiv = document.getElementById('ss-error');
  const resultsDiv = document.getElementById('ss-results');

  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  errorDiv.style.display = 'none';
  resultsDiv.style.display = 'none';

  const params = new URLSearchParams({
    pool: document.getElementById('ss-pool').value,
    strategy: document.getElementById('ss-strategy').value,
    top_n: document.getElementById('ss-top').value,
    min_score: document.getElementById('ss-min-score').value,
    delay: document.getElementById('ss-delay').value,
  });

  btn.style.display = 'none';
  const stopBtn = document.getElementById('ss-stop-btn');
  stopBtn.style.display = 'inline-block';
  stopBtn.disabled = false;
  stopBtn.textContent = '⏹ 停止扫描';
  progress.style.display = 'block';
  progressFill.style.width = '0%';
  progressFill.className = 'progress-fill';
  progressText.innerHTML = '提交扫描任务...';

  try {
    const resp = await fetch('/api/scan?' + params.toString(), { method: 'POST' });
    const data = await resp.json();
    if (!data.task_id) { throw new Error(data.error || '提交失败'); }
    pollTask(data.task_id);
  } catch(e) {
    resetScanButtons();
    progress.style.display = 'none';
    showError('提交失败: ' + e.message);
  }
}

function resetScanButtons() {
  const btn = document.getElementById('ss-btn');
  const stopBtn = document.getElementById('ss-stop-btn');
  btn.style.display = 'inline-block';
  btn.disabled = false;
  btn.textContent = '🚀 开始扫描';
  stopBtn.style.display = 'none';
  stopBtn.disabled = true;
}

async function stopScan() {
  const stopBtn = document.getElementById('ss-stop-btn');
  stopBtn.disabled = true;
  stopBtn.textContent = '⏳ 停止中...';

  try {
    const resp = await fetch('/api/scan/tasks');
    const data = await resp.json();
    const running = (data.tasks || []).find(t => t.status === 'running');
    if (!running) {
      stopBtn.textContent = '无运行中的任务';
      resetScanButtons();
      return;
    }
    const stopResp = await fetch('/api/scan/' + running.task_id + '/stop', { method: 'POST' });
    const stopData = await stopResp.json();
    if (stopData.status === 'cancelling') {
      stopBtn.textContent = '⏹ 停止中...';
    } else {
      resetScanButtons();
    }
  } catch (e) {
    showError('停止失败: ' + e.message);
    resetScanButtons();
  }
}

function pollTask(taskId) {
  const progressFill = document.getElementById('ss-progress-fill');
  const progressText = document.getElementById('ss-progress-text');

  _pollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/scan/' + taskId);
      const data = await resp.json();
      if (!data || data.error) {
        clearInterval(_pollTimer); _pollTimer = null;
        resetScanButtons();
        showError(data.error || '任务查询失败');
        return;
      }
      const p = data.progress;
      const pct = p.total > 0 ? Math.min(100, Math.round(p.scanned / p.total * 100)) : 0;
      progressFill.style.width = pct + '%';

      if (data.status === 'running') {
        progressText.innerHTML =
          `<strong>${pct}%</strong> 已扫描 ${p.scanned}/${p.total} · ` +
          `合格 <strong>${p.passed}</strong> 只 · ` +
          (p.current_stock ? `当前 ${p.current_stock} · ` : '') +
          `耗时 ${p.elapsed}s` +
          (p.eta > 0 ? ` · 预计剩余 ${p.eta}s` : '');
      } else if (data.status === 'completed') {
        clearInterval(_pollTimer); _pollTimer = null;
        progressFill.className = 'progress-fill done';
        progressText.innerHTML =
          `<strong>扫描完成</strong> 共扫描 ${p.scanned} 只 · 合格 <strong>${p.passed}</strong> 只 · 耗时 ${p.elapsed}s`;
        resetScanButtons();
        fetchResult(taskId);
      } else if (data.status === 'cancelled') {
        clearInterval(_pollTimer); _pollTimer = null;
        progressFill.className = 'progress-fill';
        progressText.innerHTML =
          `<strong>扫描已停止</strong> 已扫描 ${p.scanned}/${p.total} · 合格 ${p.passed} 只 · 耗时 ${p.elapsed}s`;
        resetScanButtons();
      } else if (data.status === 'failed') {
        clearInterval(_pollTimer); _pollTimer = null;
        progressFill.className = 'progress-fill fail';
        progressText.innerHTML = `<strong>扫描失败</strong>: ${data.error || '未知错误'}`;
        resetScanButtons();
      }
    } catch(e) {
      clearInterval(_pollTimer); _pollTimer = null;
      resetScanButtons();
      showError('轮询异常: ' + e.message);
    }
  }, 1500);
}

async function fetchResult(taskId) {
  const resultsDiv = document.getElementById('ss-results');
  const summary = document.getElementById('ss-result-summary');
  const tableDiv = document.getElementById('ss-result-table');

  try {
    const resp = await fetch('/api/scan/' + taskId + '/result');
    const data = await resp.json();
    if (!data.results || data.results.length === 0) {
      resultsDiv.style.display = 'block';
      summary.textContent = '— 无符合条件的标的';
      tableDiv.innerHTML = '<p style="color:var(--text2);font-size:.85em;">当前市场条件下，暂无触发买入信号的标的。</p>';
      return;
    }
    resultsDiv.style.display = 'block';
    summary.textContent = `— 共 ${data.count} 只`;

    let html = '<table><thead><tr><th>#</th><th>股票</th><th>代码</th><th>得分</th><th>现价</th><th>涨跌</th><th>核心信号</th></tr></thead><tbody>';
    data.results.forEach((r, i) => {
      const info = r.latest_info;
      const sign = info.pct_chg >= 0 ? '+' : '';
      const topSignals = [...r.details].sort((a,b) => b.score - a.score).slice(0, 2);
      const signalDesc = topSignals.map(d => d.desc.replace(/[（(].*[）)]/g,'')).join(' + ');
      const scoreClass = r.score >= 50 ? 'score-high' : (r.score >= 30 ? 'score-mid' : 'score-low');
      const pnlClass = info.pct_chg >= 0 ? 'pnl-up' : 'pnl-down';
      html += `<tr class="row-s" onclick="toggleDetail(this)">
        <td>${i+1}</td>
        <td><strong>${r.name}</strong></td>
        <td style="color:var(--text2)">${r.code}</td>
        <td class="${scoreClass}">${r.score}</td>
        <td>${info.close.toFixed(2)}</td>
        <td class="${pnlClass}">${sign}${info.pct_chg.toFixed(2)}%</td>
        <td style="font-size:.78em">${signalDesc}</td>
      </tr>`;
      html += `<tr class="row-detail" style="display:none"><td colspan="7">`;
      html += `<div class="detail-grid">`;
      html += `<span class="label">日期</span><span class="value">${info.date}</span>`;
      html += `<span class="label">成交量</span><span class="value">${(info.volume/10000).toFixed(0)}万</span>`;
      if (r.indicators) {
        Object.entries(r.indicators).forEach(([k,v]) => {
          if (v !== null && v !== undefined) {
            html += `<span class="label">${k}</span><span class="value">${typeof v === 'number' ? v.toFixed(2) : v}</span>`;
          }
        });
      }
      html += `</div>`;
      html += `<div style="margin-top:8px;font-size:.8em;"><strong>匹配条件:</strong></div>`;
      r.details.sort((a,b) => b.score - a.score).forEach(d => {
        html += `<div style="font-size:.78em;padding:2px 0;"><span class="cond-pass">✓ ${d.desc}</span> <span style="color:var(--text2)">${d.score}/${d.weight}</span> · ${d.detail.reason || ''}</div>`;
      });
      html += `</td></tr>`;
    });
    html += '</tbody></table>';
    tableDiv.innerHTML = html;
  } catch(e) {
    showError('获取结果失败: ' + e.message);
  }
}

function toggleDetail(row) {
  const detailRow = row.nextElementSibling;
  if (detailRow && detailRow.classList.contains('row-detail')) {
    detailRow.style.display = detailRow.style.display === 'none' ? 'table-row' : 'none';
  }
}

  const strategy = document.getElementById('ss-test-strategy').value;
  const resultDiv = document.getElementById('ss-test-result');

  if (!code) { showError('请输入股票代码'); return; }

  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<span class="spinner"></span> 正在分析...';

  try {
    const resp = await fetch(`/api/scan/test/${code}?strategy=${strategy}`, { method: 'POST' });
    const data = await resp.json();
    if (data.error) {
      resultDiv.innerHTML = `<span style="color:var(--red)">❌ 诊断失败:</span> ${data.error}`;
      return;
    }
    if (!data.passed) {
      resultDiv.innerHTML = `<span style="color:var(--amber)">⏭️ ${data.name}(${data.code}) 被排除</span>\n原因: ${data.reason || '不满足基础条件'}`;
      return;
    }
    let html = `<span style="color:var(--green);font-weight:600;">✅ ${data.name}(${data.code})</span>  得分: <strong>${data.score}</strong>\n\n`;
    const info = data.latest_info;
    html += `现价: ${info.close.toFixed(2)}  ${info.pct_chg >= 0 ? '+' : ''}${info.pct_chg.toFixed(2)}%  日期: ${info.date}\n`;
    if (data.indicators) {
      Object.entries(data.indicators).forEach(([k,v]) => {
        if (v !== null) html += `${k}: ${typeof v === 'number' ? v.toFixed(2) : v}  `;
      });
    }
    html += '\n\n匹配条件:\n';
    data.details.sort((a,b) => b.score - a.score).forEach(d => {
      html += `  ✓ ${d.desc}  (${d.score}/${d.weight})  ${d.detail.reason || ''}\n`;
    });
    resultDiv.innerHTML = html;
  } catch(e) {
    resultDiv.innerHTML = `<span style="color:var(--red)">❌ 请求异常:</span> ${e.message}`;
  }
}

function showError(msg) {
  const errorDiv = document.getElementById('ss-error');
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════
// 选股跟踪看板
// ═══════════════════════════════════════════════════════════

async function loadTracker() {
  const emptyDiv = document.getElementById('tracker-empty');
  const columnsDiv = document.getElementById('tracker-columns');
  const refreshInfo = document.getElementById('tracker-refresh-info');

  try {
    const resp = await fetch('/api/tracker');
    const data = await resp.json();
    const grouped = data.grouped || {};
    const entries = Object.values(grouped);
    const allEntries = entries.reduce((a, g) => a.concat(g.entries || []), []);

    if (allEntries.length === 0) {
      emptyDiv.style.display = 'block';
      columnsDiv.style.display = 'none';
      refreshInfo.textContent = '上次刷新: —';
      return;
    }
    emptyDiv.style.display = 'none';
    columnsDiv.style.display = 'grid';

    let lastRefresh = null;
    allEntries.forEach(e => {
      (e.stocks || []).forEach(s => {
        if (s.latest_date && (!lastRefresh || s.latest_date > lastRefresh)) {
          lastRefresh = s.latest_date;
        }
      });
    });
    refreshInfo.textContent = lastRefresh ? '上次刷新: ' + lastRefresh : '上次刷新: 从未';
    renderTracker(grouped, allEntries);
  } catch (e) {
    emptyDiv.style.display = 'block';
    columnsDiv.style.display = 'none';
    emptyDiv.innerHTML = '<span style="color:var(--red)">加载失败: ' + e.message + '</span>';
  }
}

function renderTracker(grouped, allEntries) {
  const columnsDiv = document.getElementById('tracker-columns');
  let html = '';

  for (const [stratKey, stratGroup] of Object.entries(grouped)) {
    html += `<div class="tracker-column">`;
    html += `<h3>${stratGroup.strategy_name}</h3>`;

    const entries = stratGroup.entries || [];
    entries.sort((a, b) => b.scan_date.localeCompare(a.scan_date));

    entries.forEach(entry => {
      html += `<div class="tracker-date-group">`;
      html += `<div class="tracker-date-title">`;
      html += `<span>${entry.scan_date}</span>`;
      html += `<span class="pool-tag">${entry.pool_name || ''} Top${entry.top_n || '?'}</span>`;
      html += `<button class="delete-btn" title="删除" onclick="deleteTrackerEntry('${entry.id}', this)">✕</button>`;
      html += `</div>`;

      const stocks = entry.stocks || [];
      if (stocks.length === 0) {
        html += `<div class="tracker-no-data" style="padding:8px">该次扫描无结果</div>`;
      } else {
        html += `<div class="scan-results"><table class="tracker-table">`;
        html += `<thead><tr>`;
        html += `<th>#</th><th>代码</th><th>名称</th><th>得分</th><th>被选价</th><th>最新价</th><th>涨跌</th>`;
        html += `</tr></thead><tbody>`;
        stocks.forEach((s, i) => {
          const pnlClass = s.pct_change === null ? '' : (s.pct_change >= 0 ? 'tracker-pnl-up' : 'tracker-pnl-down');
          const pnlText = s.pct_change === null ? '—' : (s.pct_change >= 0 ? '+' : '') + s.pct_change.toFixed(2) + '%';
          const scoreClass = s.score >= 50 ? 'score-high' : (s.score >= 30 ? 'score-mid' : 'score-low');
          html += `<tr>`;
          html += `<td style="color:var(--text2)">${i + 1}</td>`;
          html += `<td style="color:var(--text2)">${s.code}</td>`;
          html += `<td><strong>${s.name}</strong></td>`;
          html += `<td class="${scoreClass}"><strong>${s.score || 0}</strong></td>`;
          html += `<td>${s.scan_price ? s.scan_price.toFixed(2) : '—'}</td>`;
          html += `<td>${s.latest_price ? s.latest_price.toFixed(2) : '—'}</td>`;
          html += `<td class="${pnlClass}">${pnlText}</td>`;
          html += `</tr>`;
        });
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }
  columnsDiv.innerHTML = html;
}

async function refreshTracker() {
  const btn = document.getElementById('tracker-refresh-btn');
  const refreshInfo = document.getElementById('tracker-refresh-info');

  btn.disabled = true;
  btn.textContent = '⏳ 刷新中...';
  refreshInfo.textContent = '正在获取最新价格...';

  try {
    const resp = await fetch('/api/tracker/refresh', { method: 'POST' });
    const data = await resp.json();
    refreshInfo.textContent = '上次刷新: ' + (data.refresh_time || '刚完成');
    const grouped = data.grouped || {};
    const entries = Object.values(grouped);
    const allEntries = entries.reduce((a, g) => a.concat(g.entries || []), []);
    renderTracker(grouped, allEntries);

    const emptyDiv = document.getElementById('tracker-empty');
    const columnsDiv = document.getElementById('tracker-columns');
    if (allEntries.length === 0) {
      emptyDiv.style.display = 'block';
      columnsDiv.style.display = 'none';
    } else {
      emptyDiv.style.display = 'none';
      columnsDiv.style.display = 'grid';
    }
  } catch (e) {
    refreshInfo.textContent = '刷新失败: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 刷新全部价格';
  }
}

async function deleteTrackerEntry(entryId, btn) {
  if (!confirm('确认删除该条跟踪记录？')) return;
  try {
    const resp = await fetch('/api/tracker/' + entryId, { method: 'DELETE' });
    const data = await resp.json();
    if (data.status === 'deleted') loadTracker();
  } catch (e) {
    alert('删除失败: ' + e.message);
  }
}

// ═══════════════════════════════════════════════════════════
(async function init() {
  await loadStrategies();
  loadDashboard();
})();
