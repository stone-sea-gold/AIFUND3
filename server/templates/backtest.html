<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>回测系统</title>
<link rel="stylesheet" href="/static/css/common.css?v=7">
<link rel="stylesheet" href="/static/css/backtest.css?v=7">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>

<!-- ════════ Navigation Bar ════════ -->
<nav class="navbar">
  <div class="nav-logo">
    <span class="logo-dot"></span>
    <span>股票交易看板</span>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">看板</a>
    <a href="/backtest" class="nav-link active">回测系统</a>
    <a href="/settings" class="nav-link">设置</a>
  </div>
</nav>

<main class="page-container">

  <div class="section-header">
    <h1>回测系统</h1>
    <p>对选股策略进行历史回测，评估策略绩效</p>
  </div>

  <!-- Config -->
  <div class="card">
    <h2 style="margin-top:0">回测配置</h2>
    <div class="form-row">
      <div class="form-group"><label class="form-label">策略</label><select class="form-select" id="bt-strategy"></select></div>
      <div class="form-group"><label class="form-label">股票池</label><select class="form-select" id="bt-pool" style="min-width:120px"><option value="">加载中...</option></select></div>
      <div class="form-group"><label class="form-label">每轮选股数</label><input class="form-input" type="number" id="bt-topn" value="10" min="1" max="50"></div>
      <div class="form-group"><label class="form-label">最低分</label><input class="form-input" type="number" id="bt-minscore" value="25" min="0" max="100"></div>
      <div class="form-group"><label class="form-label">持有天数</label><input class="form-input" type="number" id="bt-hold" value="3" min="1" max="60"></div>
      <div class="form-group"><label class="form-label">本金(元)</label><input class="form-input" type="number" id="bt-capital" value="100000" min="10000" step="10000"></div>
    </div>
    <div class="form-row mt-4">
      <div class="form-group"><label class="form-label">开始日期</label><input class="form-input" type="date" id="bt-start"></div>
      <div class="form-group"><label class="form-label">结束日期</label><input class="form-input" type="date" id="bt-end"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-run" onclick="submitBacktest()">开始回测</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card mt-4 hidden" id="progress-section">
    <h2 style="margin-top:0">回测进度</h2>
    <div class="progress-bar"><div class="progress-fill running" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text">准备中...</div>
  </div>

  <!-- Results -->
  <div id="result-section" class="hidden">
    <div class="flex items-center justify-between mt-6 mb-4">
      <h2 style="margin:0">回测结果</h2>
      <button class="btn-close-result" onclick="closeResult()">关闭</button>
    </div>
    <div class="bt-metrics" id="metrics-grid"></div>

    <div class="chart-box">
      <h3 style="margin-top:0">净值曲线 (NAV)</h3>
      <div id="chart-nav" class="chart"></div>
    </div>
    <div class="chart-box">
      <h3 style="margin-top:0">收益率分布</h3>
      <div id="chart-dist" class="chart"></div>
    </div>

    <div class="card mt-4">
      <h2 style="margin-top:0">交易明细</h2>
      <div class="table-wrap" style="max-height:500px;overflow-y:auto">
        <table>
          <thead><tr>
            <th>代码</th><th>名称</th><th>买入日</th><th>卖出日</th><th class="text-right">收益率</th><th class="text-right">评分</th><th>原因</th>
          </tr></thead>
          <tbody id="trades-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card mt-6">
    <h2 style="margin-top:0">历史回测</h2>
    <div class="task-list" id="task-list">
      <div class="text-sm text-muted text-center" style="padding:24px">加载中...</div>
    </div>
  </div>

</main>

<!-- Toast & Modal -->
<div id="toast-container" class="toast-container"></div>
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel-btn">取消</button>
      <button class="btn btn-primary" id="modal-confirm-btn">确认</button>
    </div>
  </div>
</div>

<script src="/static/js/common.js?v=7"></script>
<script src="/static/js/backtest.js?v=7"></script>
</body>
</html>
